<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer circular boundary / clock bezel -->
  <circle cx="16" cy="16" r="13" fill="#09090b" stroke="#ffffff" stroke-width="3.5" />

  <!-- Time block slice (filled sector/pie piece representing a block of time) -->
  <path d="M 16 16 L 16 3 A 13 13 0 0 1 27.26 22.5 Z" fill="#a1a1aa" />

  <!-- Bold clock hands -->
  <line x1="16" y1="16" x2="16" y2="6" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="16" y1="16" x2="24" y2="16" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />

  <!-- Center pin -->
  <circle cx="16" cy="16" r="2" fill="#09090b" />
</svg>
